{% extends "base.html" %}
{% block title %}联系客服 — AI深度决策{% endblock %}
{% block body %}
<div style="max-width:480px;margin:60px auto;padding:0 20px;">
  <a href="{{ url_for('index') }}" style="font-size:.85rem;color:var(--text3,#999);text-decoration:none;">← 返回首页</a>
  <h2 style="margin:20px 0 8px;font-size:1.2rem;">联系客服</h2>
  <p style="color:var(--text3,#999);font-size:.88rem;margin-bottom:24px;">我们通常在 24 小时内回复</p>

  {% if submitted_ticket %}
  <div style="background:#efffef;border:1px solid #6c6;color:#363;padding:14px 16px;border-radius:8px;margin-bottom:24px;">
    已收到你的问题，我们会尽快回复。
  </div>
  {% endif %}

  <form method="POST" style="margin-bottom:32px;">
    <label style="display:block;font-size:.85rem;margin-bottom:4px;">你的问题</label>
    <textarea name="question" rows="4" required
              placeholder="描述你遇到的问题或想法…"
              style="width:100%;padding:10px 12px;border:1px solid var(--border,#ddd);border-radius:8px;font-size:.95rem;resize:vertical;box-sizing:border-box;margin-bottom:12px;"></textarea>
    <label style="display:block;font-size:.85rem;margin-bottom:4px;">联系方式（微信 / 邮箱，方便回复）</label>
    <input type="text" name="contact" placeholder="可选"
           style="width:100%;padding:9px 12px;border:1px solid var(--border,#ddd);border-radius:8px;font-size:.95rem;box-sizing:border-box;margin-bottom:14px;">
    <button type="submit"
            style="width:100%;padding:11px;background:var(--accent,#6c63ff);color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;">
      提交
    </button>
  </form>

  {% if latest and latest.reply %}
  <div style="border-top:1px solid var(--border,#eee);padding-top:20px;">
    <p style="font-size:.85rem;color:var(--text3,#999);margin-bottom:8px;">上一条问题的客服回复：</p>
    <div style="background:var(--surface,#f5f5f5);border-radius:8px;padding:12px 14px;font-size:.92rem;white-space:pre-wrap;">{{ latest.reply }}</div>
  </div>
  {% endif %}
</div>
{% endblock %}
